<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Sincronizador de Impressão - Dash Eats</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-card">
        <div class="header">
            <div class="logo-placeholder">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z" />
                </svg>
            </div>
            <h2>DashEats</h2>
            <p class="subtitle" id="subtitle-context">Sincronizador de Impressão</p>
        </div>

        <!-- TELA DE LOGIN -->
        <div id="tela-login">
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required />
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="••••••••" required />
            </div>
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
                <input type="checkbox" id="lembrar-me" style="width: auto; margin: 0;" />
                <label for="lembrar-me" style="margin-bottom: 0; cursor: pointer; font-size: 14px;">Lembrar e-mail e
                    senha</label>
            </div>
            <button id="btn-login" class="btn-primary" onclick="fazerLogin()">
                Conectar Agora
            </button>
            <p id="erro-login" style="color: var(--error);"></p>
        </div>

        <!-- TELA DE IMPRESSÃO (Escondida até logar) -->
        <div id="tela-impressao" class="hidden">
            <div id="status-servidor" class="status-badge desconectado">Desconectado</div>

            <div class="input-group">
                <label>Impressora do Caixa (Vias completas)</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="select-impressora-caixa" onchange="salvarMapeamento()" style="flex: 1;">
                        <option value="">Nenhuma (Não imprimir via do caixa)</option>
                    </select>
                    <div style="width: 80px;">
                        <label style="font-size: 10px; margin-bottom: 2px;">Vias</label>
                        <input type="number" id="qtd-vias-caixa" value="1" min="1" max="5" onchange="salvarMapeamento()"
                            style="padding: 10px; font-size: 14px; text-align: center;">
                    </div>
                </div>
                <p style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">Esta impressora receberá o
                    pedido completo.</p>
            </div>

            <div id="setores-config" style="margin-top: 20px;">
                <h3 style="font-size: 14px; margin-bottom: 10px;">Impressoras por Setor (Produção)</h3>
                <div id="lista-setores-mapeamento">
                    <!-- Gerado dinamicamente -->
                    <p style="font-size: 12px; color: var(--text-secondary);">Carregando setores...</p>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 20px;">
                <button onclick="sincronizarManualmente()" class="btn-outline" style="font-size: 13px; padding: 10px;">
                    🔄 Sincronizar Pedidos Pendentes
                </button>

            </div>

            <div class="logs-container" style="border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px;">
                <h3>Últimas Impressões</h3>
                <ul id="lista-impressoes">
                    <li>Aguardando pedidos...</li>
                </ul>
            </div>

            <button onclick="fazerLogout()" class="btn-danger"
                style="margin-top: 24px; font-size: 13px; padding: 10px;">
                Sair da Conta
            </button>
        </div>
    </div>

    <script src="./renderer.js"></script>
</body>

</html>
